<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Егор Горохов</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">


</head>
<body>
        <header class="container">
        <span class="logo">Portfolio</span>
        <nav>
            <ul>
                <li><a href="{{ url_for('home') }}">About me</a></li>
                <li><a href="{{ url_for('portfolio') }}">Portfolio</a></li>
                <li class="btn active"><a href="{{ url_for('contacts') }}">Contacts</a></li>
            </ul>
        </nav>
    </header>


    <div class="container">
    <h1>Мои проекты</h1>

    <div class="projects-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px;">

        <!-- Цикл Flask, который сам создаст HTML для каждого проекта из базы данных -->
        {% for project in projects %}
            <div class="project-card" style="background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ddd;">
                <h2>{{ project.title }}</h2>
                <p style="margin-top: 10px; line-height: 1.6;">{{ project.description }}</p>
            </div>
        {% endfor %}

    </div>
</div>

</body>
</html>
